<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaxiBocarchi — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #121929;
    --surface2: #1a2438;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f4ff;
    --muted: #7a8aaa;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  #root { max-width: 1100px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .status-dot {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .grid-top {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }

  .metric-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .metric-value {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
  }

  .metric-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: rgba(59,130,246,0.1); color: var(--accent2); }

  .grid-bottom {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 16px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 18px;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
  }

  .feed { display: flex; flex-direction: column; gap: 10px; }

  .feed-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .feed-item:hover { border-color: var(--border2); }

  .feed-left { display: flex; align-items: center; gap: 12px; }

  .feed-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .feed-time {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .feed-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
  }

  .big-counter {
    text-align: center;
    padding: 12px 0 4px;
  }

  .big-num {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: -4px;
    line-height: 1;
    transition: all 0.4s;
  }

  .big-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  .alert-box {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
  }

  .alert-urgent { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .alert-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .alert-watch { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }

  .refresh-btn:hover { background: var(--surface); }

  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 0; }

  @media (max-width: 700px) {
    .grid-top { grid-template-columns: 1fr; }
    .grid-bottom { grid-template-columns: 1fr; }
    body { padding: 16px; }
    .big-num { font-size: 60px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const SERVER = "http://localhost:5000";

function getAlertState(n) {
  if (n === 0) return { cls: "alert-ok", icon: "✓", msg: "Sin pasajeros — parada libre" };
  if (n < 3)   return { cls: "alert-ok", icon: "✓", msg: `${n} pasajero${n>1?'s':''} — nivel normal` };
  if (n === 3)  return { cls: "alert-watch", icon: "⚠", msg: "3 pasajeros — próximo al umbral" };
  return { cls: "alert-urgent", icon: "!", msg: `${n} pasajeros — alerta enviada a Telegram` };
}

function getCountColor(n) {
  if (n === 0) return "var(--muted)";
  if (n < 3)   return "var(--green)";
  if (n === 3)  return "var(--amber)";
  return "var(--red)";
}

function getBadge(n) {
  if (n === 0) return { cls: "badge-blue", txt: "Vacío" };
  if (n < 3)   return { cls: "badge-green", txt: "Normal" };
  if (n === 3)  return { cls: "badge-amber", txt: "Atención" };
  return { cls: "badge-red", txt: "Urgente" };
}

let chartInstance = null;

function App() {
  const [registros, setRegistros] = React.useState([]);
  const [ultimo, setUltimo] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [serverOk, setServerOk] = React.useState(false);
  const [ahora, setAhora] = React.useState(new Date());
  const canvasRef = React.useRef(null);

  const fetchData = async () => {
    try {
      const r = await fetch(`${SERVER}/historial`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      setRegistros(data);
      if (data.length > 0) setUltimo(data[data.length - 1]);
      setServerOk(true);
    } catch {
      setServerOk(false);
    } finally {
      setLoading(false);
    }
  };

  React.useEffect(() => {
    fetchData();
    const iv = setInterval(fetchData, 15000);
    const clock = setInterval(() => setAhora(new Date()), 1000);
    return () => { clearInterval(iv); clearInterval(clock); };
  }, []);

  React.useEffect(() => {
    if (!canvasRef.current || registros.length === 0) return;
    const recent = [...registros].slice(-20);
    const labels = recent.map(r => r.timestamp.slice(11,16));
    const data   = recent.map(r => r.personas);

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Personas",
          data,
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59,130,246,0.08)",
          borderWidth: 2,
          pointBackgroundColor: data.map(v => v >= 3 ? "#ef4444" : "#3b82f6"),
          pointRadius: 4,
          tension: 0.35,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y} persona${ctx.parsed.y !== 1 ? 's' : ''}`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#7a8aaa", font: { family: "JetBrains Mono", size: 10 }, maxRotation: 0 },
            grid: { color: "rgba(255,255,255,0.04)" }
          },
          y: {
            beginAtZero: true,
            ticks: { color: "#7a8aaa", stepSize: 1 },
            grid: { color: "rgba(255,255,255,0.04)" }
          }
        }
      }
    });
  }, [registros]);

  const totalAlertas = registros.filter(r => r.alerta_enviada).length;
  const maxPersonas  = registros.length > 0 ? Math.max(...registros.map(r => r.personas)) : 0;
  const promedio     = registros.length > 0
    ? (registros.reduce((a, r) => a + r.personas, 0) / registros.length).toFixed(1)
    : "—";

  const personasActuales = ultimo?.personas ?? 0;
  const alertState = getAlertState(personasActuales);
  const badge = getBadge(personasActuales);

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <div className="logo">🚖</div>
          <div>
            <h1>TaxiBocarchi</h1>
            <p>Sistema de monitoreo de parada — TAXIBOCARCHI</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div className="status-dot">
            <div className="dot" style={{background: serverOk ? "var(--green)" : "var(--red)", boxShadow: `0 0 8px ${serverOk ? "var(--green)" : "var(--red)"}`}} />
            {serverOk ? "Servidor activo" : "Sin conexión"}
          </div>
          <button className="refresh-btn" onClick={fetchData}>↻ Actualizar</button>
        </div>
      </div>

      <div style={{fontSize:12,color:"var(--muted)",fontFamily:"JetBrains Mono",marginBottom:20}}>
        {ahora.toLocaleDateString("es-EC",{weekday:"long",year:"numeric",month:"long",day:"numeric"})} · {ahora.toLocaleTimeString("es-EC")}
      </div>

      <div className="grid-top">
        <div className="card">
          <div className="metric-label">Personas ahora</div>
          <div className="big-counter">
            <div className="big-num" style={{color: getCountColor(personasActuales)}}>
              {loading ? "—" : personasActuales}
            </div>
            <div className="big-label">en la parada</div>
          </div>
          <div style={{marginTop:14}} className={`alert-box ${alertState.cls}`}>
            <span>{alertState.icon}</span>
            <span>{alertState.msg}</span>
          </div>
        </div>

        <div className="card">
          <div className="metric-label">Estadísticas</div>
          <div style={{display:"flex",flexDirection:"column",gap:14,marginTop:8}}>
            <div>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Total detecciones</div>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:-1}}>{registros.length}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Alertas enviadas</div>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:-1,color:"var(--amber)"}}>{totalAlertas}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Promedio personas</div>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:-1,color:"var(--accent2)"}}>{promedio}</div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="metric-label">Última detección</div>
          {ultimo ? (
            <div style={{marginTop:8}}>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Timestamp</div>
              <div style={{fontFamily:"JetBrains Mono",fontSize:13,color:"var(--text)",marginBottom:14}}>
                {ultimo.timestamp}
              </div>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Personas detectadas</div>
              <div style={{fontSize:36,fontWeight:700,letterSpacing:-1,color:getCountColor(ultimo.personas),marginBottom:12}}>
                {ultimo.personas}
              </div>
              <span className={`badge ${badge.cls}`}>● {badge.txt}</span>
              <div style={{marginTop:12,fontSize:11,color:"var(--muted)"}}>
                Alerta Telegram: <span style={{color: ultimo.alerta_enviada ? "var(--green)" : "var(--muted)"}}>
                  {ultimo.alerta_enviada ? "✓ Enviada" : "— No enviada"}
                </span>
              </div>
            </div>
          ) : (
            <div className="empty">{loading ? "Cargando..." : "Sin datos aún"}</div>
          )}
        </div>
      </div>

      <div className="grid-bottom">
        <div className="card">
          <div className="card-title">Histórico de detecciones</div>
          {registros.length > 0 ? (
            <div className="chart-wrap">
              <canvas ref={canvasRef} role="img" aria-label="Gráfica histórica de personas detectadas en la parada" />
            </div>
          ) : (
            <div className="empty">{loading ? "Cargando datos..." : "Sin datos históricos aún"}</div>
          )}
        </div>

        <div className="card">
          <div className="card-title">Últimos registros</div>
          <div className="feed">
            {registros.length === 0 && (
              <div className="empty">{loading ? "Cargando..." : "Sin registros"}</div>
            )}
            {[...registros].reverse().slice(0, 7).map((r, i) => {
              const b = getBadge(r.personas);
              return (
                <div className="feed-item" key={r.id || i}>
                  <div className="feed-left">
                    <div className="feed-icon" style={{
                      background: r.personas >= 3 ? "var(--red-bg)" : "var(--green-bg)"
                    }}>
                      {r.personas >= 3 ? "🔴" : "🟢"}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:500}}>{r.personas} persona{r.personas !== 1 ? "s" : ""}</div>
                      <div className="feed-time">{r.timestamp.slice(11,19)}</div>
                    </div>
                  </div>
                  <span className={`badge ${b.cls}`}>{b.txt}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"var(--muted)"}}>
        Actualización automática cada 15 segundos · TaxiBocarchi © 2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
